<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno - TOTVS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-login-background {
            background-image: url('https://alunos.sesisenaipr.org.br/FrameHTML/Web/App/Edu/PortalEducacional/login/assets/img/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-slide-down {
            animation: slideDown 0.8s ease-out forwards;
            opacity: 0;
        }

        .delay-logo {
            animation-delay: 0.8s;
        }

        select::-ms-expand {
            display: none;
        }

        .portal-title {
            font-size: 20px;
            letter-spacing: 0.25em;
            font-weight: 700;
        }

        .input-box-height {
            height: 54px;
        }

        /* Popup overlay */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Popup box animation */
        @keyframes popupBounce {
            0% {
                transform: scale(0.7) translateY(20px);
                opacity: 0;
            }
            50% {
                transform: scale(1.02) translateY(-5px);
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .popup-overlay.active .popup-box {
            animation: popupBounce 0.4s ease-out forwards;
        }

        .popup-box {
            opacity: 0;
        }

        /* Shake animation for the icon */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }

        .shake-icon {
            animation: shake 0.6s ease-in-out 0.4s;
        }
    </style>
</head>
<body class="bg-login-background min-h-screen flex flex-col justify-center items-center font-sans antialiased relative overflow-hidden">
    
    <!-- Popup de Senha Incorreta -->
    <div id="errorPopup" class="popup-overlay" onclick="closePopupOutside(event)">
        <div class="popup-box bg-white rounded-xl shadow-2xl max-w-sm w-[90%] mx-4 overflow-hidden">
            <!-- Header vermelho -->
            <div class="bg-gradient-to-r from-red-500 to-red-600 px-6 py-5 flex items-center gap-3">
                <div class="shake-icon bg-white/20 rounded-full p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                </div>
                <h3 class="text-white text-lg font-bold">Erro de Autenticação</h3>
            </div>
            <!-- Conteúdo -->
            <div class="px-6 py-5">
                <div class="flex items-start gap-3 mb-1">
                    <div class="flex-shrink-0 mt-0.5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                            <line x1="12" y1="9" x2="12" y2="13"></line>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </div>
                    <p class="text-gray-700 text-[15px] leading-relaxed">
                        <strong>Senha incorreta.</strong><br>
                        <span class="text-gray-500 text-sm">Verifique suas credenciais e tente novamente.</span>
                    </p>
                </div>
            </div>
            <!-- Botão -->
            <div class="px-6 pb-5">
                <button onclick="closePopup()" class="w-full bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-semibold py-3 rounded-lg transition-all duration-200 text-[15px] tracking-wide">
                    TENTAR NOVAMENTE
                </button>
            </div>
        </div>
    </div>

    <div class="z-10 w-full max-w-[340px] flex flex-col-reverse items-center">
        
        <!-- Cartão de Login -->
        <div class="bg-[#0b6e7f] w-full px-7 py-9 shadow-2xl relative rounded-md animate-slide-down">
            
            <h2 class="text-white text-center portal-title mb-8 uppercase">
                Portal do Aluno
            </h2>

            <form class="space-y-4" onsubmit="event.preventDefault(); showPopup();">
                
                <!-- Campo de Usuário -->
                <div class="flex input-box-height w-full bg-white shadow-sm rounded overflow-hidden">
                    <div class="bg-[#f2a12a] w-14 flex-shrink-0 flex items-center justify-center text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <input type="text" placeholder="Usuário" class="flex-1 px-4 text-[15px] text-gray-700 outline-none w-full" />
                </div>

                <!-- Campo de Senha -->
                <div class="flex input-box-height w-full bg-white shadow-sm rounded overflow-hidden">
                    <div class="bg-[#f2a12a] w-14 flex-shrink-0 flex items-center justify-center text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" placeholder="Senha" class="flex-1 px-4 text-[15px] text-gray-700 outline-none w-full" />
                </div>

                <!-- Campo de Seleção -->
                <div class="flex input-box-height w-full bg-white shadow-sm relative rounded overflow-hidden">
                    <div class="bg-[#f2a12a] w-14 flex-shrink-0 flex items-center justify-center text-white z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                            <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
                            <path d="M3 12A9 3 0 0 0 21 12"></path>
                        </svg>
                    </div>
                    
                    <select class="flex-1 px-4 text-[15px] text-gray-500 outline-none appearance-none bg-transparent w-full cursor-pointer relative z-10">
                        <option value="CorporeRM">CorporeRM</option>
                        <option value="Protheus">Protheus</option>
                    </select>
                    
                    <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none z-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>

                <!-- Botão -->
                <div class="pt-2">
                    <button type="submit" class="w-full bg-[#129ebf] hover:bg-[#0f87a3] text-white text-[15px] font-medium tracking-wide h-[54px] transition-colors duration-200 rounded">
                        ACESSAR
                    </button>
                </div>
            </form>

            <!-- Link de recuperação -->
            <div class="mt-6 text-center">
                <a href="#" class="text-white text-[14px] font-bold underline decoration-white hover:text-gray-200 transition-colors">
                    Esqueceu sua senha?
                </a>
            </div>
        </div>

        <!-- Logotipo Original -->
        <div class="mb-8 animate-slide-down delay-logo">
            <img 
                src="https://alunos.sesisenaipr.org.br/FrameHTML/Web/App/Edu/PortalEducacional/login/assets/img/logo-responsivo.png" 
                alt="Logo TOTVS Sesi Senai" 
                class="h-12 w-auto object-contain"
                onerror="this.style.display='none';"
            />
        </div>

    </div>

    <script>
        function showPopup() {
            const popup = document.getElementById('errorPopup');
            popup.classList.add('active');
        }

        function closePopup() {
            const popup = document.getElementById('errorPopup');
            popup.classList.remove('active');
        }

        function closePopupOutside(event) {
            if (event.target === event.currentTarget) {
                closePopup();
            }
        }

        // Fechar com tecla Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePopup();
            }
        });
    </script>
</body>
</html>
